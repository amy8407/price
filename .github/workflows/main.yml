name: 축산 가격 수집 (돼지 + 한우)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib google-auth pandas numpy requests beautifulsoup4 playwright openpyxl xlsxwriter

      - name: Install Playwright Browsers
        run: playwright install --with-deps firefox

      - name: 돼지 가격 수집
        env:
          EKAPE_API_KEY: ${{ secrets.EKAPE_API_KEY }}
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python pork.py

      - name: 한우 가격 수집 + 마진 계산
        env:
          EKAPE_API_KEY: ${{ secrets.EKAPE_API_KEY }}
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python beef_all.py
